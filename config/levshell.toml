# Levshell global configuration.
#
# This file lives at ~/.config/levshell/levshell.toml. Per-module configs go in
# ~/.config/levshell/modules/<name>.toml; sync adapter configs go in
# ~/.config/levshell/sync/<provider>.toml; project declarations in
# ~/.config/levshell/projects/<slug>.toml.
#
# The [shell] and [appearance] sections below are parsed at daemon
# start and seed the initial UI state on shell connect. Runtime
# `levshell-ctl` commands (density / scale / theme follow-system)
# still override at any time — these are just the boot defaults.
# Unknown keys/sections are ignored, so [power]/[ipc] remain harmless
# placeholders until they're wired.

[shell]
# Initial bar density: "full" | "compact" | "hidden".
density = "full"

[appearance]
# Internal, compositor-independent UI scale (clamped to 0.5–4.0).
# Equivalent to `levshell-ctl scale <factor>` but persisted.
# ui_scale = 1.75
# Follow the system (XDG desktop-portal) light/dark preference at
# boot — switches to the active theme's paired variant on each OS
# flip. Equivalent to `levshell-ctl theme follow-system on`.
# follow_system = false

[power]
# When the system is on battery, all module poll intervals are doubled
# (or set to a module-specific battery interval). Set to false to disable.
power_aware = true

[ipc]
# Override only if $XDG_RUNTIME_DIR is unset or you want a custom path.
# socket_path = "/run/user/1000/levshell.sock"
