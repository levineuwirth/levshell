# Levshell built-in theme — neutral dark.
#
# Spec §3.2.1 notes this as one of the three shipped themes:
# "a neutral dark (true gray, no hue bias)". Surfaces are
# desaturated to near-gray; accent colors are unchanged from the
# warm-dark palette so the single-primary spec still applies.
#
# Same caveats apply as warm-dark.toml — every non-[meta]/[colors]
# section is optional.

[meta]
name = "Neutral Dark"
author = "Levshell"
variant = "dark"

[colors]
# 4-tier surface hierarchy — true-gray luminance steps.
bg             = "#1A1A1A"
bg_dark        = "#121212"
surface        = "#242424"
surface_raised = "#2E2E2E"
overlay        = "#3A3A3A"

fg          = "#D4D4D4"
fg_muted    = "#6E6E6E"
fg_subtle   = "#909090"
on_primary  = "#121212"
on_surface  = "#D4D4D4"
outline     = "#3A3A3A"

# Same accent hues as warm-dark; the neutrality is in the surfaces.
primary           = "#7AA2F7"
primary_variant   = "#5A7FD4"
secondary         = "#BB9AF7"
secondary_variant = "#9D7CD8"
tertiary          = "#7DCFFF"

success = "#9ECE6A"
warning = "#E0AF68"
error   = "#F7768E"
info    = "#2AC3DE"
